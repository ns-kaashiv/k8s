apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-deployment
  namespace: prod
spec:
  replicas: 3

  selector:
    matchLabels:
      app: web-app

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  template:
    metadata:
      labels:
        app: web-app
        
    spec:
      containers:
      - name: web-app
        image: kaashivinfotech/k8s:old

        ports:
        - containerPort: 8080

        startupProbe:
          httpGet:
            path: /
            port: 8080
          failureThreshold: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3

        envFrom:
        - configMapRef:
            name: web-env-config

        - secretRef:
            name: db-secret
            
        volumeMounts:
        - name: config-volume
          mountPath: /config

      volumes:
      - name: config-volume
        configMap:
          name: web-env-config

